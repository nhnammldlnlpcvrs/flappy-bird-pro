<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Flappy Bird Pro</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐤</text></svg>" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="game-container">
      <!-- Start Screen -->
      <div id="start-screen" class="game-ui flex flex-col items-center gap-5">
        <h1 class="text-5xl font-black text-white tracking-wider score-text">FLAPPY BIRD</h1>
        <p class="text-white/70 text-lg">PRO</p>
        <button id="start-btn" class="btn btn-start mt-4">Start Game</button>
        <p class="text-white/50 text-sm mt-2">Tap, Click, or press Space to fly</p>
      </div>

      <!-- Score Display -->
      <div id="score-display" class="game-ui top-8 hidden">
        <span id="score" class="text-6xl font-black text-white score-text">0</span>
      </div>

      <!-- Get Ready -->
      <div id="get-ready" class="game-ui hidden">
        <span class="text-3xl font-bold text-white score-text">Get Ready!</span>
      </div>

      <!-- Game Over Modal -->
      <div id="game-over-modal" class="game-ui hidden">
        <div class="bg-black/75 backdrop-blur-sm rounded-2xl px-10 py-8 flex flex-col items-center gap-3 border border-white/10">
          <h2 class="text-3xl font-black text-white">Game Over</h2>
          <div class="flex gap-8 my-2">
            <div class="text-center">
              <p class="text-white/60 text-sm">Score</p>
              <p id="final-score" class="text-3xl font-bold text-white">0</p>
            </div>
            <div class="text-center">
              <p class="text-white/60 text-sm">Best</p>
              <p id="best-score" class="text-3xl font-bold text-yellow-400">0</p>
            </div>
          </div>
          <button id="restart-btn" class="btn btn-restart mt-2">Play Again</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
